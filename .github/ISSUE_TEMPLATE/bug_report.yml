name: Bug report
about: Create a report to help us fix a bug.

labels:
  - bug

title: "Bug: "

body:
  - type: markdown
    attributes:
      value: |
        Please fill out the information below to help us reproduce the issue.
  - type: input
    id: steps_to_reproduce
    attributes:
      label: Steps to reproduce
      description: Describe how to reproduce the bug.
      placeholder: |
        1. Go to...
        2. Click on...
        3. Observe...
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
      required: true
  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual behavior
      description: What happened instead?
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser / OS / Node version, if relevant.
      placeholder: e.g. macOS 14, Chrome 123
  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Add any other details, screenshots, or logs.
